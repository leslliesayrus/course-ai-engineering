name: 04-ecs-aws CI

on:
  push:
    branches: ["**"]
    paths:
      - "04-ecs-aws/**"
      - ".github/workflows/04-ecs-aws.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 04-ecs-aws-ecr-${{ github.ref_name == 'main' && 'prd' || 'dev' }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 437274056715.dkr.ecr.us-east-1.amazonaws.com
  TF_STATE_BUCKET: bkt-terraform-backend
  TF_STATE_KEY_PREFIX_ECR: 04-ecs-aws/terraform-ecr
  TF_STATE_KEY_PREFIX_ECS: 04-ecs-aws/terraform

jobs:
  deploy-ecr-and-images:
    runs-on: ubuntu-latest
    env:
      ENVIRON: ${{ github.ref_name == 'main' && 'prd' || 'dev' }}

    outputs:
      environ: ${{ env.ENVIRON }}
      ecr_backend_repository_url: ${{ steps.terraform.outputs.ecr_backend_repository_url }}
      ecr_frontend_repository_url: ${{ steps.terraform.outputs.ecr_frontend_repository_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          echo "ENVIRON=${ENVIRON}"
          echo "TF_VAR_env=${ENVIRON}"
          echo "TF state (ECR)=${TF_STATE_KEY_PREFIX_ECR}/${ENVIRON}/terraform.tfstate"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform init (ECR)
        working-directory: 04-ecs-aws/terraform_ecr
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX_ECR}/${ENVIRON}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform apply (ECR)
        id: terraform
        working-directory: 04-ecs-aws/terraform_ecr
        env:
          TF_VAR_env: ${{ env.ENVIRON }}
        run: |
          terraform apply -auto-approve
          echo "ecr_backend_repository_url=$(terraform output -raw ecr_backend_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_frontend_repository_url=$(terraform output -raw ecr_frontend_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Build and push backend image
        env:
          IMAGE: ${{ steps.terraform.outputs.ecr_backend_repository_url }}
        run: |
          docker build -t chat-backend:latest 04-ecs-aws/backend
          docker tag chat-backend:latest "${IMAGE}:latest"
          docker push "${IMAGE}:latest"

      - name: Build and push frontend image
        env:
          IMAGE: ${{ steps.terraform.outputs.ecr_frontend_repository_url }}
        run: |
          docker build -t chat-frontend:latest 04-ecs-aws/frontend
          docker tag chat-frontend:latest "${IMAGE}:latest"
          docker push "${IMAGE}:latest"

  deploy-ecs:
    needs: deploy-ecr-and-images
    runs-on: ubuntu-latest
    env:
      ENVIRON: ${{ needs.deploy-ecr-and-images.outputs.environ }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform init (ECS)
        working-directory: 04-ecs-aws/terraform
        run: |
          echo "TF state (ECS)=${TF_STATE_KEY_PREFIX_ECS}/${ENVIRON}/terraform.tfstate"
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX_ECS}/${ENVIRON}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform apply (ECS)
        working-directory: 04-ecs-aws/terraform
        env:
          TF_VAR_environ: ${{ env.ENVIRON }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
        run: terraform apply -auto-approve

      - name: URLs públicas
        working-directory: 04-ecs-aws/terraform
        run: |
          echo "=== URLs públicas (HTTP) ==="
          echo "frontend_url=$(terraform output -raw frontend_url)"
          echo "backend_url=$(terraform output -raw backend_url)"
          echo "backend_message_url=$(terraform output -raw backend_message_url)"
